<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintHub Pro | Boutique Store</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #6366f1; --dark: #1e293b; --bg: #f8fafc; --success: #22c55e; --accent: #f59e0b; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--dark); overflow: hidden; }
        
        /* SIDEBAR - Desktop Default */
        #sidebar { 
            width: 260px; height: 100vh; background: #fff; border-right: 1px solid #e2e8f0; 
            padding: 25px 20px; display: flex; flex-direction: column; box-sizing: border-box; 
            overflow-y: auto; flex-shrink: 0;
        }
        #sidebar h1 { color: var(--primary); font-size: 1.4rem; margin-bottom: 20px; }
        .nav-item { padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; color: #64748b; font-weight: 500; transition: 0.2s; font-size: 0.9rem; white-space: nowrap; }
        .active-cat { background: var(--primary) !important; color: white !important; }

        /* MAIN CONTENT AREA */
        #main { flex: 1; padding: 30px; overflow-y: auto; box-sizing: border-box; }
        
        #shipping-promo { 
            background: linear-gradient(90deg, #6366f1, #a855f7); color: white; 
            padding: 15px; border-radius: 15px; margin-bottom: 25px; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        #searchInput { padding: 12px; width: 250px; border-radius: 10px; border: 1px solid #ddd; flex-grow: 1; max-width: 400px; outline: none; }

        /* PRODUCT GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; text-align: center; }

        /* SLIDER */
        .slider-container { position: relative; width: 100%; height: 380px; overflow: hidden; border-radius: 1px; margin-bottom: 15px; background: #f1f5f9; }
        .slider-wrapper { display: flex; transition: transform 0.4s ease; height: 100%; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        .slider-dots { position: absolute; bottom: 8px; width: 100%; display: flex; justify-content: center; gap: 5px; }
        .dot { width: 7px; height: 7px; background: rgba(0,0,0,0.2); border-radius: 50%; cursor: pointer; }
        .dot.active { background: var(--primary); width: 15px; border-radius: 4px; }

        /* CART PANEL */
        #cart-panel { position: fixed; top: 0; right: -100%; width: 400px; height: 100%; background: #fff; box-shadow: -15px 0 40px rgba(0,0,0,0.1); z-index: 1000; transition: 0.4s; display: flex; flex-direction: column; }
        #cart-scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        
        /* RESPONSIVE BREAKPOINTS */
        @media screen and (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            #sidebar { 
                width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e2e8f0;
                padding: 10px; flex-direction: row; overflow-x: auto; position: sticky; top: 0; z-index: 999;
            }
            #sidebar h1 { display: none; }
            .nav-item { margin-bottom: 0; margin-right: 5px; font-size: 0.8rem; padding: 8px 12px; }
            
            #main { padding: 25px; overflow: visible; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } 
            .card { padding: 10px; }
            .card h3 { font-size: 0.8rem; height: 35px; overflow: hidden; }
            .slider-container { height: 200px; }
            
            #shipping-promo { flex-direction: column; text-align: center; gap: 5px; font-size: 0.8rem; }
            #cart-panel { width: 100%; } 
        }

        /* Form/Utility Styles */
        .color-label { font-size: 0.75rem; color: #64748b; margin-bottom: 5px; height: 15px; font-weight: 600; }
        .color-swatch { display: inline-block; width: 22px; height: 22px; border-radius: 50%; margin: 4px; cursor: pointer; border: 2px solid #e2e8f0; transition: 0.2s; }
        .selected { border-color: var(--primary); transform: scale(1.2); box-shadow: 0 0 5px rgba(99, 102, 241, 0.5); }
        .qty-row { display: flex; align-items: center; background: #f1f5f9; border-radius: 8px; padding: 2px 8px; }
        .qty-btn { background: none; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; color: var(--primary); }
        .checkout-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .btn-main { background: #25D366; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; }
        #toast { position: fixed; bottom: 25px; right: 25px; background: var(--success); color: white; padding: 12px 25px; border-radius: 50px; opacity: 0; transition: 0.4s; z-index: 9999; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>PrintHub</h1>
        <div id="cat-all" class="nav-item active-cat" onclick="render('all')">All Products</div>
        <div id="cat-cloths" class="nav-item" onclick="render('cloths')">👕 Premium Cloths</div>

        <div id="cat-return" class="nav-item" onclick="render('return')">🎁 Return Gifts</div>
        <div id="cat-gift" class="nav-item" onclick="render('gift')">✨Gifts</div>
    </div>

    <div id="main">
        <div id="shipping-promo">
            <div id="promo-text"><strong>🚚 Shipping:</strong> Free delivery above ₹2000!</div>
            <div id="promo-status" style="font-weight: bold;">₹0 / ₹2000</div>
        </div>
        
        <div class="top-bar">
            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
            <button onclick="toggleCart()" style="padding:10px 15px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">🛒 Cart (<span id="count">0</span>)</button>
        </div>

        <div class="grid" id="itemGrid"></div>
    </div>

    <div id="cart-panel">
        <div style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">My Basket</h2>
            <button onclick="toggleCart()" style="background:#eee; border:none; width:35px; height:35px; border-radius:50%; font-size:1.2rem; cursor:pointer;">✕</button>
        </div>
        <div id="cart-scroll-area">
            <div id="cart-list"></div>
            <div style="margin-top:30px; border-top:1px solid #eee; padding-top:30px;">
                <input type="text" id="cust-name" class="checkout-input" placeholder="Full Name">
                <input type="text" id="cust-phone" class="checkout-input" placeholder="Mobile Number">
                <textarea id="cust-address" class="checkout-input" placeholder="Full Delivery Address" rows="3"></textarea>
                <div id="total-area" style="background:#f8fafc; padding:25px; border-radius:20px; margin-bottom:20px;"></div>
                <button class="btn-main" onclick="handleFinalOrder()">Confirm Order & Save</button>
            </div>
        </div>
    </div>

    <div id="toast">Added!</div>

    <script>

        const FREE_SHIPPING_THRESHOLD = 2000;
        const colorNames = { '#000000': 'Black', '#FFFFFF': 'White', '#FF0000': 'Red', '#1e293b': 'Navy' };
        
            const products = [

    { id: 604, name: 'Mouse Pad', cat: 'Corp', price: 199, colors: ['#000000', '#FFFFFF', '#FF0000', '#1e293b'], imgs: ['Mpousepad.png', 'Mousepadname.png'] },

    { id: 401, name: 'CoffeBite/coconut Bite chocolate', cat: 'choco', price: 5, colors: [], imgs: ['https://placehold.co/400x400?text=Dark+Box', 'https://placehold.co/400x400?text=Dark+Inside'] },
    { id: 402, name: 'England chocolates', cat: 'choco', price: 8, colors: [], imgs: ['https://placehold.co/400x400?text=Dark+Box', 'https://placehold.co/400x400?text=Dark+Inside'] },

    { id: 201, name: 'White AAA Photo Mug', cat: 'gift', price: 199, colors: [], imgs: ['whiteAAA mug.png', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 202, name: 'White heart Handle Mug', cat: 'gift', price: 249, colors: [], imgs: ['https://placehold.co/400x400?text=Mug+Cold', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 203, name: '3Tone Normal Handle Mug', cat: 'gift', price: 249, colors: ['#000000', '#FFFFFF', '#FF0000', '#1e293b'], imgs: ['mugs-color.webp', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 204, name: 'Glitter Magic Mug', cat: 'gift', price:349, colors: [], imgs: ['Glitter Magic.png', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 205, name: 'Magic Normal Handle Mug', cat: 'gift', price: 349, colors: ['#000000', '#FFFFFF', '#FF0000', '#1e293b'], imgs: ['Magic-mug.png', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 206, name: 'Custom Sipper Water Bottle(600ML)', cat: 'gift', price: 399, colors: ['#000000', '#FFFFFF', '#FF0000', '#1e293b'], imgs: ['Aluminum.webp', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 207, name: 'Cap', cat: 'gift', price: 199, colors: ['#000000', '#FFFFFF', '#FF0000', '#1e293b'], imgs: ['cap-1.png', 'cap-crop.jpg'] },
    { id: 208, name: 'Custom notebook with your photo and name', cat: 'gift', price: 449, colors: ['#000000', '#FFFFFF', '#FF0000', '#1e293b'], imgs: ['photo-dairy.png', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 209, name: 'Mouse Pad', cat: 'gift', price: 149, colors: [], imgs: ['Mpousepad.png', 'https://placehold.co/400x400?text=Mug+Hot'] },
    
    { id: 501, name: 'White heart Handle Mug', cat: 'return', price: 249, colors: [], imgs: ['https://placehold.co/400x400?text=Mug+Cold', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 502, name: '3Tone Normal Handle Mug', cat: 'return', price: 349, colors: [], imgs: ['https://placehold.co/400x400?text=Mug+Cold', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 503, name: 'Glitter Magic Mug', cat: 'return', price: 369, colors: [], imgs: ['https://placehold.co/400x400?text=Mug+Cold', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 504, name: 'Custom temperature bottle with name/Logo ', cat: 'return', price: 499, colors: [], imgs: ['Temp-bottle.png', 'https://placehold.co/400x400?text=Mug+Hot'] },
    { id: 505, name: 'Personalized Round Metal Keychains', cat: 'return', price: 35, colors: [], imgs: ['key-1.png', 'https://placehold.co/400x400?text=Mug+Hot'] }
];

        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        let selectedColors = {};

        function render(cat = 'all') {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-cat'));
            if(document.getElementById(`cat-${cat}`)) document.getElementById(`cat-${cat}`).classList.add('active-cat');
            const filtered = products.filter(p => cat === 'all' || p.cat === cat);
            document.getElementById('itemGrid').innerHTML = filtered.map(p => {
                const selHex = selectedColors[p.id];
                const selName = selHex ? colorNames[selHex] : (p.colors.length > 0 ? "Pick a color" : "");
                return `
                <div class="card">
                    <div class="slider-container" id="slider-${p.id}">
                        <div class="slider-wrapper" id="wrapper-${p.id}">${p.imgs.map(img => `<img src="${img}">`).join('')}</div>
                        <div class="slider-dots">${p.imgs.map((_, i) => `<div class="dot ${i===0?'active':''}" onclick="moveSlider(${p.id}, ${i})"></div>`).join('')}</div>
                    </div>
                    <h3>${p.name}</h3>
                    <p style="font-weight:bold; color:var(--primary); margin:5px 0;">₹${p.price}</p>
                    <div class="color-label">${selName}</div>
                    <div>${p.colors.map(c => `<span class="color-swatch ${selectedColors[p.id] === c ? 'selected' : ''}" style="background:${c}" onclick="selectColor(${p.id}, '${c}', '${cat}')"></span>`).join('')}</div>
                    ${p.cat === 'cloths' ? `<select id="size-${p.id}" class="checkout-input" style="width:70px; margin:10px auto; display:block; padding:5px;"><option>S</option><option selected>M</option><option>L</option><option>XL</option></select>` : ''}
                    <button class="btn-main" style="background:var(--primary); padding:8px; font-size:0.8rem;" onclick="addToCart(${p.id})">Add to Basket</button>
                </div>`;
            }).join('');
        }

        function moveSlider(id, idx) {
            const wrapper = document.getElementById(`wrapper-${id}`);
            if(wrapper) wrapper.style.transform = `translateX(-${idx * 100}%)`;
            const dots = document.querySelectorAll(`#slider-${id} .dot`);
            dots.forEach((d, i) => d.classList.toggle('active', i === idx));
        }

        function selectColor(id, hex, cat) { selectedColors[id] = hex; render(cat); }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            const size = document.getElementById(`size-${id}`) ? document.getElementById(`size-${id}`).value : 'N/A';
            if(p.colors.length > 0 && !selectedColors[id]) return Swal.fire("Required", "Please select a color first!", "warning");
            const colorHex = selectedColors[id] || 'Default';
            const colorName = colorNames[colorHex] || colorHex;
            const existing = cart.find(i => i.id === id && i.color === colorName && i.size === size);
            if(existing) { existing.qty++; } else { cart.push({ ...p, qty: 1, color: colorName, size: size }); }
            saveAndRefresh();
            showStatus("Added!");
        }

        function updateQty(idx, delta) {
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            saveAndRefresh();
        }

        function refreshCart() {
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const shipping = (subtotal >= FREE_SHIPPING_THRESHOLD || subtotal === 0) ? 0 : SHIPPING_FEE;
            const total = subtotal + shipping;
            document.getElementById('count').innerText = cart.reduce((s,i) => s + i.qty, 0);
            document.getElementById('promo-status').innerText = subtotal >= FREE_SHIPPING_THRESHOLD ? "Free Shipping Goal Reached!" : `₹${subtotal} / ₹${FREE_SHIPPING_THRESHOLD}`;
            
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:0.85rem;"><b>${i.name}</b><br>${i.size !== 'N/A' ? i.size : ''} ${i.color !== 'Default' ? '| ' + i.color : ''}</div>
                    <div class="qty-row"><button class="qty-btn" onclick="updateQty(${idx}, -1)">-</button><span>${i.qty}</span><button class="qty-btn" onclick="updateQty(${idx}, 1)">+</button></div>
                    <b>₹${i.price * i.qty}</b>
                </div>`).join('');
            document.getElementById('total-area').innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.85rem;"><span>Subtotal:</span><span>₹${subtotal}</span></div>
                <div style="display:flex; justify-content:space-between; font-size:0.85rem;"><span>Shipping:</span><span>₹${shipping}</span></div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--primary); font-size:1.1rem; border-top:1px solid #ddd; margin-top:5px; padding-top:5px;"><span>Grand Total:</span><span>₹${total}</span></div>`;
        }

        function handleFinalOrder() {
            const user = { name: document.getElementById('cust-name').value.trim(), phone: document.getElementById('cust-phone').value.trim(), addr: document.getElementById('cust-address').value.trim() };
            if(!user.name || !user.phone || !user.addr) return Swal.fire("Error", "Please fill all details", "error");
            if(cart.length === 0) return Swal.fire("Cart Empty", "Add items first", "info");
            
            const newOrderId = "PH-" + Math.floor(100000 + Math.random() * 900000);
            const now = new Date();
            const timeStr = now.toLocaleDateString() + " " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;
            const total = subtotal + shipping;

            generatePDF(user, subtotal, shipping, total, newOrderId, timeStr);
            sendWhatsApp(user, total, newOrderId, timeStr);
            cart = []; saveAndRefresh();
            Swal.fire("Order Placed!", "Opening WhatsApp...", "success").then(() => location.reload());
        }

        // --- FULL WHATSAPP BREAKDOWN RESTORED ---
        function sendWhatsApp(user, total, orderId, timeStr) {
            let msg = `*NEW ORDER - PRINTHUB*%0A`;
            msg += `*Order ID:* ${orderId}%0A`;
            msg += `*Date/Time:* ${timeStr}%0A`;
            msg += `----------------------------%0A`;
            msg += `*Customer:* ${user.name}%0A`;
            msg += `*Mobile:* ${user.phone}%0A`;
            msg += `*Address:* ${user.addr}%0A%0A`;
            msg += `*ITEMS:*%0A`;
            
            cart.forEach(i => {
                const itemTotal = i.price * i.qty;
                msg += `- ${i.name} (${i.size}/${i.color})%0A`;
                msg += `  Qty: ${i.qty} x ₹${i.price} = *₹${itemTotal}*%0A%0A`;
            });

            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;

            msg += `----------------------------%0A`;
            msg += `*Subtotal:* ₹${subtotal}%0A`;
            msg += `*Shipping:* ${shipping === 0 ? 'FREE' : '₹' + shipping}%0A`;
            msg += `*TOTAL PAYABLE: ₹${total}*%0A`;
            msg += `----------------------------`;

            window.open(`https://wa.me/9398273846?text=${msg}`);
        }

        // --- FULL PDF TABLE AND WATERMARK RESTORED ---
        function generatePDF(user, subtotal, shipping, total, orderId, timeStr) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // --- WATERMARK ---
            doc.setTextColor(235, 235, 235); 
            doc.setFontSize(60); 
            doc.setFont(undefined, 'bold');
            doc.text("PRINTHUB", 40, 160, { angle: 45 }); 
            doc.text("PRINTHUB", 100, 220, { angle: 45 });

            // Header Section
            doc.setFillColor(99, 102, 241); 
            doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255); 
            doc.setFontSize(22); 
            doc.text("PRINTHUB receipt", 20, 22);
            doc.setFontSize(10); 
            doc.text(`Order ID: ${orderId}`, 20, 32); 
            doc.text(`Date & Time: ${timeStr}`, 20, 38);

            // Customer Details
            doc.setTextColor(0); 
            doc.setFontSize(11); 
            doc.setFont(undefined, 'bold'); 
            doc.text("DELIVER TO:", 20, 60);
            doc.setFont(undefined, 'normal'); 
            doc.text(`Name: ${user.name}`, 20, 67); 
            doc.text(`Mobile: ${user.phone}`, 20, 73); 
            doc.text(`Address: ${user.addr}`, 20, 79);

            // Table Header
            let y = 95;
            doc.setFillColor(245, 245, 255); 
            doc.rect(20, y-6, 170, 8, 'F');
            doc.setTextColor(99, 102, 241); 
            doc.setFont(undefined, 'bold');
            doc.text("ITEM (SIZE / COLOR)", 25, y); 
            doc.text("QTY", 135, y); 
            doc.text("PRICE", 165, y);
            
            // Items List
            y += 10; 
            doc.setTextColor(0); 
            doc.setFont(undefined, 'normal');
            cart.forEach(i => {
                let itemStr = i.name + ((i.size !== 'N/A' || i.color !== 'Default') ? ` (${i.size}/${i.color})` : '');
                doc.text(itemStr, 25, y); 
                doc.text(`${i.qty}`, 138, y); 
                doc.text(`INR ${i.price * i.qty}`, 165, y);
                y += 8;
            });

            // Totals Section
            y += 10; 
            doc.line(120, y, 190, y); 
            y += 10;
            doc.text("Subtotal:", 125, y); 
            doc.text(`INR ${subtotal}`, 185, y, { align: 'right' });
            y += 8; 
            doc.text("Shipping Fee:", 125, y); 
            doc.text(shipping === 0 ? "FREE" : `INR ${shipping}`, 185, y, { align: 'right' });
            
            // Grand Total Box
            y += 5; 
            doc.setFillColor(99, 102, 241); 
            doc.rect(120, y, 75, 12, 'F');
            doc.setTextColor(255); 
            doc.setFontSize(13); 
            doc.setFont(undefined, 'bold');
            doc.text("GRAND TOTAL:", 125, y + 8); 
            doc.text(`INR ${total}`, 190, y + 8, { align: 'right' });

            // --- TERMS & CONDITIONS ---
            y += 25; 
            doc.setTextColor(0); 
            doc.setFontSize(10); 
            doc.setFont(undefined, 'bold'); 
            doc.text("Terms & Conditions:", 20, y);
            doc.setFont(undefined, 'normal'); 
            doc.setFontSize(9);
            doc.text("1. While opening the parcel, a continuous unboxing video is mandatory.", 20, y + 6);
            doc.text("2. Returns are only accepted if the product is damaged (video proof required).", 20, y + 11);

            // --- NEW REVIEW FOOTER ---
            y += 30; 
            doc.setTextColor(34, 197, 94); // Success Green
            doc.setFontSize(16); 
            doc.setFont(undefined, 'bold');
            doc.text("Thanks for your order! Please leave a review.", 105, y, { align: 'center' });
            
            y += 10; 
            doc.setTextColor(100); 
            doc.setFontSize(10); 
            doc.setFont(undefined, 'normal');
            doc.text("We are happy to help you in case of any issues.", 105, y, { align: 'center' });
            doc.text("Happy Shopping from PrintHub!", 105, y + 6, { align: 'center' });

            doc.save(`Receipt_${orderId}.pdf`);
        }

        function saveAndRefresh() { localStorage.setItem('myCart', JSON.stringify(cart)); refreshCart(); }
        function toggleCart() { 
            const panel = document.getElementById('cart-panel');
            panel.style.right = (panel.style.right === "0px") ? "-100%" : "0px"; 
        }
        function showStatus(m) { const t = document.getElementById('toast'); t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }
        function filterProducts() { const q = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('.card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none'); }
        render(); refreshCart();
    </script>
</body>
</html>
